providers:
  openai:
    chat_models: ["gpt-*"]
    embedding_models: ["text-embedding-3-*"]
    chat_model_settings: {}
    embedding_model_settings: {}
    env:
      OPENAI_API_KEY: "sk-..."

  bedrock:
    chat_models: ["anthropic.claude*"]
    embedding_models: ["amazon.titan-embed-text-*"]
    chat_model_settings: {}
    embedding_model_settings: {}
    env:
      AWS_ACCESS_KEY_ID: "ak-..."
      AWS_SECRET_ACCESS_KEY: "sk-..."
      AWS_DEFAULT_REGION: "us-east-1"

  google-gla:
    chat_models: ["gemini-*"]
    embedding_models: ["gemini-embedding-*"]
    chat_model_settings: {}
    embedding_model_settings: {}
    env:
      GOOGLE_API_KEY: "AIza..."

server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1
  log_level: "info"
